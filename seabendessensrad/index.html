<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SESabendessens Rad</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Verdana, Geneva, sans-serif;
    background: #0d0d1a;
    color: #e8e8f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
    overflow-x: hidden;
  }

  /* Starfield */
  #stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .star {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    animation: twinkle var(--d) ease-in-out infinite alternate;
    opacity: 0;
  }
  @keyframes twinkle {
    0%   { opacity: 0.1; }
    100% { opacity: var(--max-op); }
  }

  h1, .subtitle, .wheel-section, .btn-row {
    position: relative; z-index: 1;
  }

  h1 {
    font-size: 1.5rem; font-weight: 400;
    letter-spacing: 0.02em; margin-bottom: 0.25rem;
    color: #e8e8f0;
  }
  h1 span { font-weight: 700; color: #c9a84c; }

  .subtitle { font-size: 0.75rem; color: #6677aa; margin-bottom: 2rem; }

  .wheel-section { display: flex; flex-direction: column; align-items: center; gap: 1rem; }

  .pointer {
    width: 0; height: 0;
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-top: 22px solid #c9a84c;
    margin-bottom: -6px; position: relative; z-index: 2;
    filter: drop-shadow(0 0 4px #c9a84c88);
  }

  canvas#wheel-canvas {
    filter: drop-shadow(0 0 18px #1a1a3a);
  }

  .btn-row {
    display: flex; gap: 0.75rem; align-items: center;
    flex-wrap: wrap; justify-content: center;
  }

  .btn {
    font-family: Verdana, Geneva, sans-serif;
    font-size: 0.85rem; padding: 0.6rem 2rem;
    border: 1px solid #c9a84c;
    background: transparent;
    color: #c9a84c;
    cursor: pointer; border-radius: 2px;
    transition: background 0.15s, color 0.15s;
    letter-spacing: 0.03em;
  }
  .btn:hover { background: #c9a84c; color: #0d0d1a; }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .weight-toggle {
    display: flex; align-items: center; gap: 0.5rem;
    font-size: 0.75rem; color: #6677aa;
    background: transparent;
    border: 1px solid #2a2a4a; padding: 0.4rem 0.9rem;
    border-radius: 2px; cursor: pointer; transition: all 0.15s; user-select: none;
  }
  .weight-toggle input { display: none; }
  .weight-toggle.active {
    background: #1a1a3a; border-color: #c9a84c; color: #c9a84c;
  }

  #result-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,5,0.75); z-index: 100;
    align-items: center; justify-content: center;
  }
  #result-overlay.show { display: flex; }

  #result-box {
    background: #0f0f22;
    border: 1px solid #2a2a4a;
    border-radius: 2px; padding: 2.5rem 3rem;
    text-align: center; max-width: 420px; width: 90%;
    position: relative; z-index: 101;
    box-shadow: 0 0 40px #0a0a1a;
  }

  #result-label {
    font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase;
    color: #6677aa; margin-bottom: 0.75rem;
  }

  #result-name {
    font-size: 2.2rem; font-weight: 700; color: #c9a84c;
    line-height: 1.2; margin-bottom: 1.5rem; word-break: break-word;
    text-shadow: 0 0 20px #c9a84c66;
  }

  #result-close {
    font-family: Verdana, Geneva, sans-serif; font-size: 0.85rem;
    padding: 0.6rem 2rem; border: 1px solid #c9a84c;
    background: transparent; color: #c9a84c; cursor: pointer; border-radius: 2px;
    transition: background 0.15s, color 0.15s;
  }
  #result-close:hover { background: #c9a84c; color: #0d0d1a; }

  #confetti-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 102; }
</style>
</head>
<body>

<div id="stars"></div>

<h1><span>SES</span>abendessens Rad</h1>
<p class="subtitle">δείπνο?</p>

<div class="wheel-section">
  <div class="pointer"></div>
  <canvas id="wheel-canvas" width="320" height="320"></canvas>
  <div class="btn-row" style="margin-top:0.5rem;">
    <button class="btn" id="spin-btn" onclick="spin()">Drehen!</button>
    <label class="weight-toggle" id="weight-toggle">
      <input type="checkbox" id="small-lunch"> 🌙 Nicht wirklich Lust
    </label>
  </div>
</div>

<div id="result-overlay" onclick="closeResult()">
  <canvas id="confetti-canvas"></canvas>
  <div id="result-box" onclick="event.stopPropagation()">
    <div id="result-label">Heute Abend gibt's…</div>
    <div id="result-name">—</div>
    <button id="result-close" onclick="closeResult()">Mahlzeit! 🍽</button>
  </div>
</div>

<script>
// ============================================================
// DINNER OPTIONS
// Set small: true to boost with "Nicht wirklich Lust" toggle
// ============================================================
const OPTIONS = [
  { name: "Nichts... wir gehen nach hause", small: true  },
  { name: "Leyerstraße",  small: false },
  { name: "China Star",   small: false },
  { name: "Italiener",    small: false },
  { name: "Humbser",      small: false },
  { name: "Tucher",       small: false },
  { name: "Thai",         small: false },
  { name: "Burger",       small: false },
  { name: "Indisch",      small: false },
  { name: "Grichisch",    small: false }
];
// ============================================================

const COLORS = [
  '#2d4a7a','#7a2d3a','#2d6e4a','#7a5a1a','#5a2d7a',
  '#1a5a6e','#7a4a1a','#1a4a7a','#6e2d5a','#1a6e5a'
];

// Star field
(function() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    const dur  = (Math.random() * 3 + 2).toFixed(1) + 's';
    const maxOp = (Math.random() * 0.6 + 0.3).toFixed(2);
    s.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%; top:${Math.random()*100}%;
      --d:${dur}; --max-op:${maxOp};
      animation-delay:${(Math.random()*4).toFixed(1)}s;
    `;
    container.appendChild(s);
  }
})();

let spinning = false;
let angle = 0;

const canvas       = document.getElementById('wheel-canvas');
const ctx          = canvas.getContext('2d');
const weightToggle = document.getElementById('weight-toggle');
const weightCheck  = document.getElementById('small-lunch');

weightToggle.addEventListener('click', () => {
  weightCheck.checked = !weightCheck.checked;
  weightToggle.classList.toggle('active', weightCheck.checked);
  drawWheel();
});

function getWeighted() {
  return OPTIONS.map((o, i) => {
    const weight = (weightCheck.checked && o.small) ? 4 : 1;
    return { ...o, weight, idx: i };
  });
}

function totalWeight(opts) { return opts.reduce((s, o) => s + o.weight, 0); }

function drawWheel() {
  const cx = canvas.width / 2, cy = canvas.height / 2, r = cx - 6;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const weighted   = getWeighted();
  const total      = totalWeight(weighted);
  let   sliceStart = angle - Math.PI / 2;

  weighted.forEach(opt => {
    const sliceAngle = (opt.weight / total) * 2 * Math.PI;
    const sliceEnd   = sliceStart + sliceAngle;

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, sliceStart, sliceEnd);
    ctx.closePath();
    ctx.fillStyle = COLORS[opt.idx % COLORS.length];
    ctx.fill();
    ctx.strokeStyle = '#0d0d1a';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(sliceStart + sliceAngle / 2);
    ctx.textAlign = 'right';
    ctx.fillStyle = '#e8e8f0';
    ctx.font = `bold ${sliceAngle > 0.4 ? 11 : 9}px Verdana, Geneva, sans-serif`;
    ctx.fillText(opt.name, r - 10, 4);
    ctx.restore();

    sliceStart = sliceEnd;
  });

  // Rim glow
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, 2 * Math.PI);
  ctx.strokeStyle = '#2a2a5a';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Hub
  ctx.beginPath();
  ctx.arc(cx, cy, 22, 0, 2 * Math.PI);
  ctx.fillStyle = '#0d0d1a';
  ctx.fill();
  ctx.strokeStyle = '#c9a84c';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.fillStyle = '#c9a84c';
  ctx.font = 'bold 9px Verdana, Geneva, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('SES', cx, cy);
}

function getWinnerIdx(weighted) {
  const total = totalWeight(weighted);
  const pointerInWheel = ((-angle) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
  let cumulative = 0;
  for (let i = 0; i < weighted.length; i++) {
    cumulative += (weighted[i].weight / total) * 2 * Math.PI;
    if (pointerInWheel < cumulative) return i;
  }
  return weighted.length - 1;
}

function spin() {
  if (spinning) return;
  spinning = true;
  document.getElementById('spin-btn').disabled = true;

  const weighted = getWeighted();
  const total    = totalWeight(weighted);

  let cumulative = 0;
  const rand = Math.random() * total;
  let targetIdx = 0;
  for (let i = 0; i < weighted.length; i++) {
    cumulative += weighted[i].weight;
    if (rand <= cumulative) { targetIdx = i; break; }
  }

  let sliceCentre = 0;
  for (let i = 0; i < targetIdx; i++) {
    sliceCentre += (weighted[i].weight / total) * 2 * Math.PI;
  }
  sliceCentre += (weighted[targetIdx].weight / total) * Math.PI;

  const halfSlice = (weighted[targetIdx].weight / total) * Math.PI;
  const jitter    = (Math.random() - 0.5) * halfSlice * 0.7;

  const fullSpins   = (8 + Math.floor(Math.random() * 5)) * 2 * Math.PI;
  const targetFinal = fullSpins - sliceCentre - jitter;
  const deltaAngle  = ((targetFinal - angle) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI)
                      + (8 + Math.floor(Math.random() * 5)) * 2 * Math.PI;

  const startAngle = angle;
  const duration   = 4000 + Math.random() * 1000;
  let   startTime  = null;

  function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

  function step(ts) {
    if (!startTime) startTime = ts;
    const t = Math.min((ts - startTime) / duration, 1);
    angle = startAngle + deltaAngle * easeOut(t);
    drawWheel();
    if (t < 1) {
      requestAnimationFrame(step);
    } else {
      spinning = false;
      document.getElementById('spin-btn').disabled = false;
      showResult(weighted[getWinnerIdx(weighted)].name);
    }
  }
  requestAnimationFrame(step);
}

function showResult(name) {
  document.getElementById('result-name').textContent = name;
  document.getElementById('result-overlay').classList.add('show');
  launchConfetti();
}

function closeResult() {
  document.getElementById('result-overlay').classList.remove('show');
  stopConfetti();
}

// Confetti — gold/silver night palette
const CONFETTI_COLORS = ['#c9a84c','#e8e8f0','#7a8abf','#4a6fa5','#8e44ad','#e8c96c'];
let confettiParticles = [];
let confettiFrame = null;
const confCanvas = document.getElementById('confetti-canvas');
const confCtx    = confCanvas.getContext('2d');

function launchConfetti() {
  confCanvas.width = window.innerWidth;
  confCanvas.height = window.innerHeight;
  confettiParticles = [];
  for (let i = 0; i < 160; i++) {
    confettiParticles.push({
      x: Math.random() * confCanvas.width,
      y: -10 - Math.random() * 200,
      vx: (Math.random() - 0.5) * 4,
      vy: 2 + Math.random() * 4,
      rot: Math.random() * 360,
      vrot: (Math.random() - 0.5) * 8,
      w: 6 + Math.random() * 8,
      h: 3 + Math.random() * 5,
      color: CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)],
      alpha: 1
    });
  }
  drawConfetti();
}

function drawConfetti() {
  confCtx.clearRect(0, 0, confCanvas.width, confCanvas.height);
  let alive = false;
  confettiParticles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.rot += p.vrot; p.vy += 0.05;
    if (p.y > confCanvas.height * 0.8) p.alpha -= 0.02;
    if (p.alpha > 0 && p.y < confCanvas.height + 20) alive = true;
    confCtx.save();
    confCtx.globalAlpha = Math.max(0, p.alpha);
    confCtx.translate(p.x, p.y);
    confCtx.rotate(p.rot * Math.PI / 180);
    confCtx.fillStyle = p.color;
    confCtx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    confCtx.restore();
  });
  if (alive) confettiFrame = requestAnimationFrame(drawConfetti);
  else confCtx.clearRect(0, 0, confCanvas.width, confCanvas.height);
}

function stopConfetti() {
  cancelAnimationFrame(confettiFrame);
  confCtx.clearRect(0, 0, confCanvas.width, confCanvas.height);
}

drawWheel();
</script>
</body>
</html>
