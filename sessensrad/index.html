<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SESsens Rad</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Verdana, Geneva, sans-serif;
    background: #f7f7f5; color: #1a1a1a;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; padding: 2rem 1rem 4rem;
  }
  h1 { font-size: 1.5rem; font-weight: 400; letter-spacing: 0.02em; margin-bottom: 0.25rem; }
  h1 span { font-weight: 700; }
  .subtitle { font-size: 0.75rem; color: #888; margin-bottom: 2rem; }
  .wheel-section { display: flex; flex-direction: column; align-items: center; gap: 1rem; }
  .pointer {
    width: 0; height: 0;
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-top: 22px solid #1a1a1a;
    margin-bottom: -6px; position: relative; z-index: 2;
  }
  .btn-row { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; justify-content: center; }
  .btn {
    font-family: Verdana, Geneva, sans-serif;
    font-size: 0.85rem; padding: 0.6rem 2rem;
    border: 1px solid #1a1a1a; background: #1a1a1a; color: #fff;
    cursor: pointer; border-radius: 2px; transition: background 0.15s;
  }
  .btn:hover { background: #333; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .weight-toggle {
    display: flex; align-items: center; gap: 0.5rem;
    font-size: 0.75rem; color: #555; background: #fff;
    border: 1px solid #ccc; padding: 0.4rem 0.9rem;
    border-radius: 2px; cursor: pointer; transition: all 0.15s; user-select: none;
  }
  .weight-toggle input { display: none; }
  .weight-toggle.active { background: #e8f0ff; border-color: #4a6fa5; color: #1a3a6e; }
  #result-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.55); z-index: 100;
    align-items: center; justify-content: center;
  }
  #result-overlay.show { display: flex; }
  #result-box {
    background: #fff; border-radius: 2px; padding: 2.5rem 3rem;
    text-align: center; max-width: 420px; width: 90%; position: relative; z-index: 101;
  }
  #result-label {
    font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase;
    color: #888; margin-bottom: 0.75rem;
  }
  #result-name {
    font-size: 2.2rem; font-weight: 700; color: #1a1a1a;
    line-height: 1.2; margin-bottom: 1.5rem; word-break: break-word;
  }
  #result-close {
    font-family: Verdana, Geneva, sans-serif; font-size: 0.85rem;
    padding: 0.6rem 2rem; border: 1px solid #1a1a1a;
    background: #1a1a1a; color: #fff; cursor: pointer; border-radius: 2px;
  }
  #result-close:hover { background: #333; }
  #confetti-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 102; }
</style>
</head>
<body>

<h1><span>SES</span>sens Rad</h1>
<p class="subtitle">Mangiare?</p>

<div class="wheel-section">
  <div class="pointer"></div>
  <canvas id="wheel-canvas" width="320" height="320"></canvas>
  <div class="btn-row" style="margin-top:0.5rem;">
    <button class="btn" id="spin-btn" onclick="spin()">Drehen!</button>
    <label class="weight-toggle" id="weight-toggle">
      <input type="checkbox" id="small-lunch"> 🥐 Kleines Mittagessen
    </label>
  </div>
</div>

<div id="result-overlay" onclick="closeResult()">
  <canvas id="confetti-canvas"></canvas>
  <div id="result-box" onclick="event.stopPropagation()">
    <div id="result-label">Heute gibt's…</div>
    <div id="result-name">—</div>
    <button id="result-close" onclick="closeResult()">Mahlzeit! 🍽</button>
  </div>
</div>

<script>
// ============================================================
// LUNCH OPTIONS — edit this list to customise the wheel.
// Set small: true for quick/cheap spots; these get boosted
// when the "Kleines Mittagessen" toggle is active.
// ============================================================
const OPTIONS = [
  { name: "Bäcker",       small: true  },
  { name: "Metzger",      small: false },
  { name: "Döner",        small: false },
  { name: "Pizza",        small: false },
  { name: "Lidl",         small: true  },
  { name: "Thai",         small: false },
  { name: "Burger",       small: false },
  { name: "Indisch",      small: false },
  { name: "Grichisch",    small: false }
];
// ============================================================

const COLORS = [
  '#4a6fa5','#c0392b','#27ae60','#e67e22','#8e44ad',
  '#16a085','#d35400','#2980b9','#a04060','#1abc9c'
];

let spinning = false;
let angle = 0;

const canvas  = document.getElementById('wheel-canvas');
const ctx     = canvas.getContext('2d');
const weightToggle = document.getElementById('weight-toggle');
const weightCheck  = document.getElementById('small-lunch');

weightToggle.addEventListener('click', () => {
  weightCheck.checked = !weightCheck.checked;
  weightToggle.classList.toggle('active', weightCheck.checked);
  drawWheel();
});

function getWeighted() {
  return OPTIONS.map((o, i) => {
    const weight = (weightCheck.checked && o.small) ? 4 : 1;
    return { ...o, weight, idx: i };
  });
}

function totalWeight(opts) { return opts.reduce((s, o) => s + o.weight, 0); }

function drawWheel() {
  const cx = canvas.width / 2, cy = canvas.height / 2, r = cx - 6;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const weighted = getWeighted();
  const total    = totalWeight(weighted);
  let   sliceStart = angle - Math.PI / 2;

  weighted.forEach(opt => {
    const sliceAngle = (opt.weight / total) * 2 * Math.PI;
    const sliceEnd   = sliceStart + sliceAngle;

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, sliceStart, sliceEnd);
    ctx.closePath();
    ctx.fillStyle = COLORS[opt.idx % COLORS.length];
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(sliceStart + sliceAngle / 2);
    ctx.textAlign = 'right';
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${sliceAngle > 0.4 ? 11 : 9}px Verdana, Geneva, sans-serif`;
    ctx.fillText(opt.name, r - 10, 4);
    ctx.restore();

    sliceStart = sliceEnd;
  });

  // Hub
  ctx.beginPath();
  ctx.arc(cx, cy, 22, 0, 2 * Math.PI);
  ctx.fillStyle = '#fff';
  ctx.fill();
  ctx.strokeStyle = '#ddd';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.fillStyle = '#1a1a1a';
  ctx.font = 'bold 9px Verdana, Geneva, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('SES', cx, cy);
}

function getWinnerIdx(weighted) {
  const total = totalWeight(weighted);
  const pointerInWheel = ((-angle) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
  let cumulative = 0;
  for (let i = 0; i < weighted.length; i++) {
    cumulative += (weighted[i].weight / total) * 2 * Math.PI;
    if (pointerInWheel < cumulative) return i;
  }
  return weighted.length - 1;
}

function spin() {
  if (spinning) return;
  spinning = true;
  document.getElementById('spin-btn').disabled = true;

  const weighted = getWeighted();
  const total    = totalWeight(weighted);

  // Pick winner by weight
  let cumulative = 0;
  const rand = Math.random() * total;
  let targetIdx = 0;
  for (let i = 0; i < weighted.length; i++) {
    cumulative += weighted[i].weight;
    if (rand <= cumulative) { targetIdx = i; break; }
  }

  // Compute slice centre in wheel-space
  let sliceCentre = 0;
  for (let i = 0; i < targetIdx; i++) {
    sliceCentre += (weighted[i].weight / total) * 2 * Math.PI;
  }
  sliceCentre += (weighted[targetIdx].weight / total) * Math.PI;

  // Random jitter within slice
  const halfSlice = (weighted[targetIdx].weight / total) * Math.PI;
  const jitter    = (Math.random() - 0.5) * halfSlice * 0.7;

  const fullSpins    = (8 + Math.floor(Math.random() * 5)) * 2 * Math.PI;
  const targetFinal  = fullSpins - sliceCentre - jitter;
  const deltaAngle   = ((targetFinal - angle) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI)
                       + (8 + Math.floor(Math.random() * 5)) * 2 * Math.PI;

  const startAngle = angle;
  const duration   = 4000 + Math.random() * 1000;
  let   startTime  = null;

  function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

  function step(ts) {
    if (!startTime) startTime = ts;
    const t = Math.min((ts - startTime) / duration, 1);
    angle = startAngle + deltaAngle * easeOut(t);
    drawWheel();
    if (t < 1) {
      requestAnimationFrame(step);
    } else {
      spinning = false;
      document.getElementById('spin-btn').disabled = false;
      showResult(weighted[getWinnerIdx(weighted)].name);
    }
  }
  requestAnimationFrame(step);
}

function showResult(name) {
  document.getElementById('result-name').textContent = name;
  document.getElementById('result-overlay').classList.add('show');
  launchConfetti();
}

function closeResult() {
  document.getElementById('result-overlay').classList.remove('show');
  stopConfetti();
}

// Confetti
let confettiParticles = [];
let confettiFrame = null;
const confCanvas = document.getElementById('confetti-canvas');
const confCtx    = confCanvas.getContext('2d');

function launchConfetti() {
  confCanvas.width = window.innerWidth;
  confCanvas.height = window.innerHeight;
  confettiParticles = [];
  for (let i = 0; i < 160; i++) {
    confettiParticles.push({
      x: Math.random() * confCanvas.width,
      y: -10 - Math.random() * 200,
      vx: (Math.random() - 0.5) * 4,
      vy: 2 + Math.random() * 4,
      rot: Math.random() * 360,
      vrot: (Math.random() - 0.5) * 8,
      w: 6 + Math.random() * 8,
      h: 3 + Math.random() * 5,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      alpha: 1
    });
  }
  drawConfetti();
}

function drawConfetti() {
  confCtx.clearRect(0, 0, confCanvas.width, confCanvas.height);
  let alive = false;
  confettiParticles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.rot += p.vrot; p.vy += 0.05;
    if (p.y > confCanvas.height * 0.8) p.alpha -= 0.02;
    if (p.alpha > 0 && p.y < confCanvas.height + 20) alive = true;
    confCtx.save();
    confCtx.globalAlpha = Math.max(0, p.alpha);
    confCtx.translate(p.x, p.y);
    confCtx.rotate(p.rot * Math.PI / 180);
    confCtx.fillStyle = p.color;
    confCtx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    confCtx.restore();
  });
  if (alive) confettiFrame = requestAnimationFrame(drawConfetti);
  else confCtx.clearRect(0, 0, confCanvas.width, confCanvas.height);
}

function stopConfetti() {
  cancelAnimationFrame(confettiFrame);
  confCtx.clearRect(0, 0, confCanvas.width, confCanvas.height);
}

drawWheel();
</script>
</body>
</html>
